<!DOCTYPE html>
<html>
<head>
    <title>Admin Login | ShowGo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
            display: flex;
            flex-direction: column;
            color: white;
        }

        /* Navbar */
        .navbar {
            padding: 20px 30px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
        }

        .logo {
            text-decoration: none;
            color: white;
            font-size: 22px;
        }

        /* Center */
        .container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Card */
        .login-box {
            width: 320px;
            padding: 30px;
            border-radius: 20px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(15px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
            animation: fadeIn 0.8s ease;
        }

        .login-box h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        /* Inputs */
        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 40px 12px 12px;
            border-radius: 10px;
            border: none;
            outline: none;
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .input-group input::placeholder {
            color: #ccc;
        }

        .input-group span {
            position: absolute;
            right: 10px;
            top: 10px;
            font-size: 18px;
            cursor: pointer;
        }

        /* Button */
        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 25px;
            border: none;
            background: linear-gradient(45deg,#ff416c,#ff4b2b);
            color: white;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        /* Footer */
        .footer-text {
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
            color: #bbb;
        }

        /* Animation */
        @keyframes fadeIn {
            from {opacity:0; transform:translateY(20px);}
            to {opacity:1; transform:translateY(0);}
        }
    </style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">
    <a href="index.html" class="logo">ShowGo</a>
</div>

<!-- Login -->
<div class="container">
    <div class="login-box">
        <h2>Admin Access 🔐</h2>

        <div class="input-group">
            <input type="text" id="user" placeholder="Username">
            <span>👤</span>
        </div>

        <div class="input-group">
            <input type="password" id="pass" placeholder="Password">
            <span onclick="togglePass()">👁️</span>
        </div>

        <button class="btn" onclick="login()">Login</button>

        <p class="footer-text">Only authorized admins can access</p>
    </div>
</div>

<script>
function togglePass(){
    const pass = document.getElementById("pass");
    pass.type = pass.type === "password" ? "text" : "password";
}

function login(){
    const u = document.getElementById("user").value.trim();
    const p = document.getElementById("pass").value.trim();

    if(u==="admin" && p==="1234"){
        localStorage.setItem("admin","true");
        window.location.href="admin.html";
    } else {
        alert("Invalid login ❌");
    }
}
</script>

</body>
</html>
