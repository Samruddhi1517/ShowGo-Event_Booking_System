<!DOCTYPE html>
<html>
<head>
    <title>Success | ShowGo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            text-align: center;
        }

        .container {
            padding: 30px;
        }

        h2 {
            margin-bottom: 20px;
        }

        /* Ticket Card */
        .ticket {
            max-width: 400px;
            margin: auto;
            background: white;
            color: black;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            position: relative;
            animation: fadeIn 1s ease;
        }

        .ticket h3 {
            margin-bottom: 10px;
        }

        .divider {
            border-top: 2px dashed #aaa;
            margin: 15px 0;
        }

        .qr {
            margin-top: 10px;
        }

        /* Button */
        .btn {
            margin-top: 25px;
            padding: 12px 25px;
            border-radius: 25px;
            border: none;
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            color: white;
            cursor: pointer;
            font-size: 16px;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        /* Confetti */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px);}
            to { opacity: 1; transform: translateY(0);}
        }
    </style>
</head>

<body>

<canvas id="confetti"></canvas>

<div class="container">
    <h2>🎉 Booking Confirmed!</h2>

    <div class="ticket" id="ticket"></div>

    <button class="btn" onclick="downloadTicket()">Download Ticket</button>
</div>

<script>
// Get booking data
const booking = JSON.parse(localStorage.getItem("booking"));

if(!booking){
    alert("No booking found!");
}

// Generate ticket UI
document.getElementById("ticket").innerHTML = `
    <h3>${booking.event}</h3>
    <p><strong>Date:</strong> ${booking.date}</p>
    <p><strong>Location:</strong> ${booking.location}</p>

    <div class="divider"></div>

    <p><strong>Seats:</strong> ${booking.seats.join(", ")}</p>
    <p><strong>Total Paid:</strong> ₹${booking.total}</p>

    <div class="divider"></div>

    <div class="qr">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=${booking.event}-${booking.seats}" />
    </div>
`;

// Download ticket
function downloadTicket(){
    const content = `
ShowGo Ticket
-----------------------
Event: ${booking.event}
Date: ${booking.date}
Location: ${booking.location}
Seats: ${booking.seats.join(", ")}
Total: ₹${booking.total}
-----------------------
Enjoy your event!
`;

    const blob = new Blob([content], { type: "text/plain" });
    const link = document.createElement("a");

    link.href = URL.createObjectURL(blob);
    link.download = "ShowGo_Ticket.txt";
    link.click();
}

// 🎉 Simple confetti animation
const canvas = document.getElementById("confetti");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let confetti = [];

for(let i=0;i<100;i++){
    confetti.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        r: Math.random()*6+2,
        d: Math.random()*100
    });
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = "white";

    confetti.forEach(c=>{
        ctx.beginPath();
        ctx.arc(c.x,c.y,c.r,0,Math.PI*2);
        ctx.fill();

        c.y += 2;
        if(c.y > canvas.height) c.y = 0;
    });

    requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
