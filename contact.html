<!DOCTYPE html>
<html>
<head>
    <title>Contact | ShowGo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }
        .logo {
    text-decoration: none;
    color: white;
    cursor: pointer;
}

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
        }

        /* Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            padding: 20px 40px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
        }

        .nav-links a {
            margin-left: 20px;
            color: white;
            text-decoration: none;
            position: relative;
        }

        .nav-links a::after {
            content: "";
            position: absolute;
            width: 0%;
            height: 2px;
            background: #ff416c;
            left: 0;
            bottom: -4px;
            transition: 0.3s;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        /* Main Layout */
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            gap: 40px;
            flex-wrap: wrap;
        }

        /* Left Info */
        .contact-info {
            flex: 1;
            max-width: 400px;
        }

        .contact-info h2 {
            margin-bottom: 15px;
        }

        .contact-info p {
            color: #ccc;
            margin-bottom: 20px;
        }

        .info-item {
            margin-bottom: 15px;
            font-size: 14px;
        }

        /* Form Card */
        .form-box {
            flex: 1;
            max-width: 400px;
            padding: 30px;
            border-radius: 20px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(15px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
            animation: fadeIn 1s ease;
        }

        .form-box h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group input,
        .input-group textarea {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            outline: none;
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .input-group textarea {
            resize: none;
        }

        .input-group input::placeholder,
        .input-group textarea::placeholder {
            color: #ccc;
        }

        /* Button */
        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 25px;
            border: none;
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            color: white;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        /* Animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px);}
            to { opacity: 1; transform: translateY(0);}
        }

        /* Responsive */
        @media(max-width: 768px) {
            .container {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">
    <h1><a href="index.html" class="logo">ShowGo</a></h1>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="events.html">Events</a>
        <a href="login.html">Login</a>
    </div>
</div>

<!-- Contact Section -->
<div class="container">

    <!-- Left Info -->
    <div class="contact-info">
        <h2>Get in Touch 📩</h2>
        <p>Have questions about events or bookings? We're here to help!</p>

        <div class="info-item">📍 Pune, India</div>
        <div class="info-item">📧 support@showgo.com</div>
        <div class="info-item">📞 +91 98765 43210</div>
    </div>

    <!-- Form -->
    <div class="form-box">
        <h2>Contact Us</h2>

        <form onsubmit="sendMessage(event)">
            <div class="input-group">
                <input type="text" placeholder="Your Name" required>
            </div>

            <div class="input-group">
                <input type="email" placeholder="Your Email" required>
            </div>

            <div class="input-group">
                <textarea placeholder="Your Message" rows="5" required></textarea>
            </div>

            <button type="submit" class="btn">Send Message</button>
        </form>
    </div>

</div>

<script>
function sendMessage(e){
    e.preventDefault();
    alert("Message Sent Successfully ✅");
}
</script>

</body>
</html>
