<!DOCTYPE html>
<html>
<head>
    <title>Login | ShowGo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }
       .logo {
    text-decoration: none;
    color: white;
    cursor: pointer;
}


        body {
            height: 100vh;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex;
            flex-direction: column;
            color: white;
        }

        /* Navbar */
        .navbar {
            padding: 20px 40px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
        }

        .navbar h1 {
            font-size: 24px;
        }

        /* Center container */
        .container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Card */
        .login-box {
            width: 320px;
            padding: 30px;
            border-radius: 20px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(15px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
            animation: fadeIn 1s ease;
        }

        .login-box h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        /* Inputs */
        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 40px 12px 12px;
            border-radius: 10px;
            border: none;
            outline: none;
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .input-group input::placeholder {
            color: #ccc;
        }

        .input-group span {
            position: absolute;
            right: 10px;
            top: 10px;
            font-size: 18px;
        }

        /* Button */
        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 25px;
            border: none;
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            color: white;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        /* Footer text */
        .login-box p {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }

        .login-box a {
            color: #ff416c;
            text-decoration: none;
        }

        /* Animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px);}
            to { opacity: 1; transform: translateY(0);}
        }
    </style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">
   <h1><a href="index.html" class="logo">ShowGo</a></h1>
</div>

<!-- Center Login -->
<div class="container">
    <div class="login-box">
        <h2>Welcome Back 👋</h2>

        <form onsubmit="login(event)">
            <div class="input-group">
                <input type="email" placeholder="Enter Email" required>
                <span>📧</span>
            </div>

            <div class="input-group">
                <input type="password" placeholder="Enter Password" required>
                <span>🔒</span>
            </div>

            <button type="submit" class="btn">Login</button>
        </form>

        <p>Don't have an account? <a href="signup.html">Sign up</a></p>
    </div>
</div>

<script>
function login(e){
    e.preventDefault();

    // Fake login (frontend only)
    alert("Login Successful 🎉");

    window.location.href = "events.html";
}
</script>

</body>
</html>
